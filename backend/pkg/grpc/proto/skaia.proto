syntax = "proto3";

package skaia.grpc;

option go_package = "github.com/skaia/grpc/skaia";

// GrengoService handles incoming communication from backend nodes to the central orchestrator
service GrengoService {
  rpc ReportStatus (ReportStatusRequest) returns (ReportStatusResponse);
}

// BackendService handles communication from Grengo to individual backend nodes
service BackendService {
  rpc GetStorage (GetStorageRequest) returns (GetStorageResponse);
}

// GoFTWService handles orchestration of the frappe cluster instances
service GoFTWService {
  rpc SetupInit (SetupInitRequest) returns (stream LogStreamResponse);
  rpc CheckoutSites (CheckoutSitesRequest) returns (stream LogStreamResponse);
  rpc StartDeployment (StartDeploymentRequest) returns (stream LogStreamResponse);
  rpc InstallApps (InstallAppsRequest) returns (stream LogStreamResponse);
  
  rpc ListSites (ListSitesRequest) returns (ListSitesResponse);
  rpc CheckSite (CheckSiteRequest) returns (CheckSiteResponse);
  rpc ReloadNginx (ReloadNginxRequest) returns (ReloadNginxResponse);
  rpc GetApps (GetAppsRequest) returns (GetAppsResponse);
  rpc GetSiteApps (GetSiteAppsRequest) returns (GetSiteAppsResponse);
  rpc InstallApp (InstallAppRequest) returns (stream LogStreamResponse);
  rpc UninstallApp (UninstallAppRequest) returns (stream LogStreamResponse);
  
  // New method for creating a site
  rpc NewSite (NewSiteRequest) returns (stream LogStreamResponse);
}

// ----------------------------------------------------
// GrengoService Messages
// ----------------------------------------------------
message ReportStatusRequest {
  string node_id = 1;
  string status = 2;
}

message ReportStatusResponse {
  bool success = 1;
}

// ----------------------------------------------------
// BackendService Messages
// ----------------------------------------------------
message GetStorageRequest {}

message GetStorageResponse {
  // We can serialize the existing JSON response or define strict fields
  string storage_json = 1; 
}

// ----------------------------------------------------
// GoFTWService Messages
// ----------------------------------------------------
message LogStreamResponse {
  string output = 1;
}

message SetupInitRequest {
  string branch = 1;
}

message CheckoutSitesRequest {}

message StartDeploymentRequest {
  string deployment = 1;
}

message InstallAppsRequest {
  string site_name = 1;
  repeated string apps = 2;
}

message ListSitesRequest {}
message ListSitesResponse {
  repeated string sites = 1;
}

message CheckSiteRequest {
  string site_name = 1;
}
message CheckSiteResponse {
  string status_json = 1; // Or defined strictly
}

message ReloadNginxRequest {}
message ReloadNginxResponse {
  bool success = 1;
}

message GetAppsRequest {}
message GetAppsResponse {
  repeated string apps = 1;
}

message GetSiteAppsRequest {
  string site_name = 1;
}
message GetSiteAppsResponse {
  repeated string apps = 1;
}

message InstallAppRequest {
  string site_name = 1;
  string app_name = 2;
}

message UninstallAppRequest {
  string site_name = 1;
  string app_name = 2;
}

message NewSiteRequest {
  string site_name = 1;
}
