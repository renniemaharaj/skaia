# ── Production nginx configuration for Skaia ────────────────────────────────
# Routing:
#   /api/*      => Go backend (API endpoints)
#   /uploads/*  => Go backend (cached user media)
#   /ws         => Go backend (WebSocket)
#   /health     => Go backend (healthcheck)
#   /*          => Go backend (SSR index + static SPA assets)

# ── Shared: gzip ────────────────────────────────────────────────────────────
gzip              on;
gzip_comp_level   5;
gzip_min_length   256;
gzip_vary         on;
gzip_proxied      any;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/woff2;

# ── Upstream ────────────────────────────────────────────────────────────────
upstream backend_1 {
    server skaia-backend:1080;
    keepalive 32;
}

# ── Host => backend mapping (multi-tenant) ──────────────────────────────────
# Add new tenants by:
#   1. Defining an upstream block above (backend_2, backend_3, …)
#   2. Adding a hostname entry here
map $host $backend_upstream {
    localhost        backend_1;
    skaiacraft.com   backend_1;
    # thewriterco.com  backend_2;
    default          backend_1;
}

# ── WebSocket connection upgrade map ────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Proxy cache for uploaded assets ─────────────────────────────────────────
proxy_cache_path /var/cache/nginx/uploads
                 levels=1:2
                 keys_zone=uploads_cache:10m
                 max_size=1g
                 inactive=30d
                 use_temp_path=off;

server {

    listen 80;
    server_name localhost skaiacraft.com thewriterco.com;

    client_max_body_size 50M;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── Uploaded user content (cached) ─────────────────────────────────────
    # Priority prefix match — never falls through to the SPA catch-all.
    location ^~ /uploads/ {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_cache           uploads_cache;
        proxy_cache_valid     200 30d;
        proxy_cache_valid     404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock      on;

        add_header X-Cache-Status $upstream_cache_status;

        expires 30d;
        add_header Cache-Control "public";

        add_header X-Content-Type-Options "nosniff" always;

        access_log off;
    }

    # ── API endpoints ──────────────────────────────────────────────────────
    location /api/ {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────
    location = /ws {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Also support /api/ws ───────────────────────────────────────────────
    location = /api/ws {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Health check (at root for Docker probes) ───────────────────────────
    location = /health {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Everything else => backend (SSR + static SPA assets) ────────────────
    location / {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }
}
