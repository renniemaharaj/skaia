# ── Production nginx configuration for Skaia ────────────────────────────────
# Handles: SPA serving via backend SSR, /api/ reverse-proxy,
# /uploads/ caching proxy, WebSocket

# ── Shared: gzip ────────────────────────────────────────────────────────────
gzip              on;
gzip_comp_level   5;
gzip_min_length   256;
gzip_vary         on;
gzip_proxied      any;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/woff2;

# ── Upstream ────────────────────────────────────────────────────────────────
upstream backend_1 {
    server skaia-backend:1080;
    keepalive 32;
}

# The Go backend now expects every API request to be prefixed with /api
# (the frontend sets API_BASE_URL="/api").  Nginx doesn't need to strip this
# prefix; it simply proxies the full URI to the upstream.  See buildRouter in
# main.go for the routing logic.

# ── Host → backend mapping ──────────────────────────────────────────────────
map $host $backend_upstream {
    localhost        backend_1;
    skaiacraft.com   backend_1;
    default          backend_1;
}

# ── Proxy cache for uploaded assets ─────────────────────────────────────────
proxy_cache_path /var/cache/nginx/uploads
                 levels=1:2
                 keys_zone=uploads_cache:10m
                 max_size=1g
                 inactive=30d
                 use_temp_path=off;

server {

    listen 80;
    server_name localhost skaiacraft.com thewriterco.com;

    client_max_body_size 50M;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── Uploaded user content (cached) ─────────────────────────────────────
    location ^~ /uploads/ {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_cache           uploads_cache;
        proxy_cache_valid     200 30d;
        proxy_cache_valid     404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock      on;

        add_header X-Cache-Status $upstream_cache_status;

        expires 30d;
        add_header Cache-Control "public";

        add_header X-Content-Type-Options "nosniff" always;

        access_log off;
    }

    # ── Everything → backend (SSR + static handling in Go) ────────────
    location / {

        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }
}