<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Server-injected SEO placeholders -->
  %TITLE_PLACEHOLDER%
  %META_DESCRIPTION_PLACEHOLDER%
  %OG_IMAGE_PLACEHOLDER%
  %FAVICON_PLACEHOLDER%
</head>

<body>
  <div id="root">
    <style>
      .fallback-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: var(--background-color, #121212);
        color: var(--text-color, #ffffff);
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
      }
      .fallback-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: fallback-spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        margin-bottom: 24px;
        box-shadow: 0 0 8px rgba(59, 130, 246, 0.2);
      }
      @keyframes fallback-spin {
        to { transform: rotate(360deg); }
      }
      .fallback-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 8px 0;
      }
      .fallback-text {
        font-size: 1rem;
        color: #9ca3af;
        margin: 0;
      }
    </style>
    <div class="fallback-loader">
      <div class="fallback-spinner"></div>
      <h1 class="fallback-title">Updating System...</h1>
      <p class="fallback-text">The application is currently restarting. Please wait a moment.</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
