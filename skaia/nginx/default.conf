# ── Production nginx configuration for Skaia ────────────────────────────────
# Handles: SPA serving, /api/ reverse-proxy, /uploads/ caching proxy, WebSocket

# ── Shared: gzip ─────────────────────────────────────────────────────────────
gzip              on;
gzip_comp_level   5;
gzip_min_length   256;
gzip_vary         on;
gzip_proxied      any;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/woff2;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream backend {
    server backend:1080;
    keepalive 32;
}

# ── Proxy cache for uploaded assets ──────────────────────────────────────────
proxy_cache_path /var/cache/nginx/uploads
                 levels=1:2
                 keys_zone=uploads_cache:10m
                 max_size=1g
                 inactive=30d
                 use_temp_path=off;

server {
    listen 80;
    server_name _;

    # Allow large uploads (banners, videos)
    client_max_body_size 50M;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security headers (inherited by all locations unless overridden) ───────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # ── Hashed Vite assets (JS / CSS / fonts / images) ────────────────────────
    # Vite fingerprints filenames so they are safe to cache forever.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Uploaded user content — cached at the edge by nginx ──────────────────
    # ^~ gives this block priority over the regex rule above.
    location ^~ /uploads/ {
        proxy_pass              http://backend/uploads/;

        # --- proxy plumbing ---
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";

        # --- nginx proxy-cache ---
        proxy_cache             uploads_cache;
        proxy_cache_valid       200 30d;
        proxy_cache_valid       404 1m;
        proxy_cache_use_stale   error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock        on;
        add_header              X-Cache-Status $upstream_cache_status;

        # --- client-side caching ---
        expires      30d;
        add_header   Cache-Control "public";

        # security (re-state because add_header in a location block
        # replaces the server-level headers)
        add_header X-Content-Type-Options "nosniff" always;

        access_log off;
    }

    # ── API proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass              http://backend/;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;

        # Disable buffering for SSE / streaming; keep for normal JSON.
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
    }

    # ── WebSocket ────────────────────────────────────────────────────────────
    location /api/ws {
        proxy_pass              http://backend/ws;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        "upgrade";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout      86400;
        proxy_send_timeout      86400;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
    }
}
