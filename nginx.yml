services:
  nginx:
    build:
      context: ./backend/frontend
      dockerfile: nginx/Dockerfile
    container_name: "${PROJECT_NAME:-skaia}-frontend"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - "${PROJECT_NAME:-skaia}-network"
    depends_on:
      - backend
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
