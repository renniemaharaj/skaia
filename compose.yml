#
# Skaia — Shared infrastructure
#
# This compose file runs the shared services: nginx, postgres, redis.
# Individual backend instances live in backends/<name>/compose.yml and are
# managed by the `grengo` CLI.
#
#   grengo new skaiacraft --domain skaiacraft.com
#   grengo compose up
#   grengo compose down
#

services:
  #  Nginx reverse-proxy (shared across all tenants)
  nginx:
    image: nginx:alpine
    container_name: skaia-nginx
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    command: >
      /bin/sh -c "mkdir -p /var/cache/nginx/uploads && exec nginx -g 'daemon off;'"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  #  PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: skaia-postgres
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=2000"
      - "-c"
      - "shared_buffers=4GB"
    ports:
      - "${PGPORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skaia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGPORT: ${PGPORT:-5432}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      skaia-network:
        aliases:
          - postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-skaia} -d template1 -p ${PGPORT:-5432}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  #  Redis
  redis:
    image: redis:7-alpine
    container_name: skaia-redis
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
    networks:
      - skaia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # LiveKit SFU for room voice, camera, and screen-share transport.
  # Set LIVEKIT_API_KEY, LIVEKIT_API_SECRET, and LIVEKIT_URL in the root .env.
  livekit:
    image: livekit/livekit-server:latest
    container_name: skaia-livekit
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-skaia-dev-key}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-skaia-dev-secret-change-me}
      LIVEKIT_UDP_START: ${LIVEKIT_UDP_START:-50000}
      LIVEKIT_UDP_END: ${LIVEKIT_UDP_END:-50100}
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - "0.0.0.0"
        rtc:
          tcp_port: 7881
          port_range_start: ${LIVEKIT_UDP_START:-50000}
          port_range_end: ${LIVEKIT_UDP_END:-50100}
          use_external_ip: true
        redis:
          address: redis:6379
        keys:
          ${LIVEKIT_API_KEY:-skaia-dev-key}: ${LIVEKIT_API_SECRET:-skaia-dev-secret-change-me}
    ports:
      - "${LIVEKIT_SIGNAL_PORT:-7880}:7880/tcp"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_UDP_START:-50000}-${LIVEKIT_UDP_END:-50100}:${LIVEKIT_UDP_START:-50000}-${LIVEKIT_UDP_END:-50100}/udp"
    networks:
      - skaia-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # adminer:
  #   image: dpage/pgadmin4:latest
  #   container_name: skaia-pgadmin
