version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: "${PROJECT_NAME:-skaia}-postgres"  # optional
    restart: unless-stopped
    # allow the host port to be configured via .env so multiple stacks can
    # co‑exist; the container itself always listens on 5432
    ports:
      - "${PGPORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # if clients inside the network need to know the port (e.g. psql), set
      # PGPORT appropriately; not required for our backend because it uses
      # DATABASE_URL below
      PGPORT: ${PGPORT:-5432}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./backend/internal/migrations:/docker-entrypoint-initdb.d
    networks:
      "skaia-network":
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p ${PGPORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: "${PROJECT_NAME:-skaia}-redis"  # optional
    restart: unless-stopped
    # persist Redis data on the host so each instance keeps its own storage
    volumes:
      - ./redis_data:/data
    networks:
      - "skaia-network"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # backend can reach postgres via the alias "postgres"; if you prefer to
    # refer to the container by its full name you can use
    # "${PROJECT_NAME:-skaia}-postgres" instead.
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: "${PROJECT_NAME:-skaia}-backend"
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      - PORT=${PORT}
      # construct a sensible default URL using the same PGPORT value the
      # postgres service publishes; users may still override DATABASE_URL
      # via their own env file if they wish.
      - DATABASE_URL=${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${PGPORT:-5432}/${POSTGRES_DB}}
      - REDIS_URL=${REDIS_URL}
      - ENVIRONMENT=${ENVIRONMENT}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS}
      # point SSR handler at the built frontend index
      - INDEX_FILE_PATH=/app/frontend/dist/index.html
      - PAYMENT_PROVIDER=${PAYMENT_PROVIDER:-demo}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Database pool tuning
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-100}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-50}
      - DB_CONN_MAX_LIFETIME_MIN=${DB_CONN_MAX_LIFETIME_MIN:-30}
      - DB_CONN_MAX_IDLE_TIME_MIN=${DB_CONN_MAX_IDLE_TIME_MIN:-5}
      # WebSocket hub tuning
      - WS_MAX_CONNECTIONS=${WS_MAX_CONNECTIONS:-100000}
      - WS_MAX_WORKERS=${WS_MAX_WORKERS:-256}
      - WS_SESSION_SIZE=${WS_SESSION_SIZE:-100}
      - WS_CHAT_RING_SIZE=${WS_CHAT_RING_SIZE:-80}
      - WS_PRESENCE_INTERVAL_MS=${WS_PRESENCE_INTERVAL_MS:-1000}
      # HTTP server tuning
      - HTTP_READ_TIMEOUT_SEC=${HTTP_READ_TIMEOUT_SEC:-15}
      - HTTP_WRITE_TIMEOUT_SEC=${HTTP_WRITE_TIMEOUT_SEC:-15}
      - HTTP_IDLE_TIMEOUT_SEC=${HTTP_IDLE_TIMEOUT_SEC:-60}
      - HTTP_SHUTDOWN_TIMEOUT_SEC=${HTTP_SHUTDOWN_TIMEOUT_SEC:-30}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - "skaia-network"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
  redis_data:

networks:
  "skaia-network":
    driver: bridge
