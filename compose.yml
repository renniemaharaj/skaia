# ─────────────────────────────────────────────────────────────────────────────
# Skaia — Shared infrastructure
#
# This compose file runs the shared services: nginx, postgres, redis.
# Individual backend instances live in backends/<name>/compose.yml and are
# managed by the `grengo` CLI.
#
#   grengo new skaiacraft --domain skaiacraft.com
#   grengo compose up
#   grengo compose down
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx reverse-proxy (shared across all tenants) ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: skaia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    command: >
      /bin/sh -c "mkdir -p /var/cache/nginx/uploads && exec nginx -g 'daemon off;'"
    networks:
      - skaia-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: skaia-postgres
    restart: unless-stopped
    ports:
      - "${PGPORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skaia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGPORT: ${PGPORT:-5432}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      skaia-network:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skaia} -d template1 -p ${PGPORT:-5432}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: skaia-redis
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
    networks:
      - skaia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # adminer:
  #   image: dpage/pgadmin4:latest
  #   container_name: skaia-pgadmin
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
  #   networks:
  #     - skaia-network

networks:
  skaia-network:
    name: skaia-network
    driver: bridge
