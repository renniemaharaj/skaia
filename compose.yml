services:
  postgres:
    image: postgres:16-alpine
    container_name: skaia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./backend/internal/migrations:/docker-entrypoint-initdb.d
    networks:
      - skaia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skaia-redis
    ports:
      - "6379:6379"
    networks:
      - skaia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skaia-backend
    ports:
      - "${PORT}:${PORT}"
    environment:
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENVIRONMENT=${ENVIRONMENT}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Database pool tuning
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-100}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-50}
      - DB_CONN_MAX_LIFETIME_MIN=${DB_CONN_MAX_LIFETIME_MIN:-30}
      - DB_CONN_MAX_IDLE_TIME_MIN=${DB_CONN_MAX_IDLE_TIME_MIN:-5}
      # WebSocket hub tuning
      - WS_MAX_CONNECTIONS=${WS_MAX_CONNECTIONS:-100000}
      - WS_MAX_WORKERS=${WS_MAX_WORKERS:-256}
      - WS_SESSION_SIZE=${WS_SESSION_SIZE:-100}
      - WS_CHAT_RING_SIZE=${WS_CHAT_RING_SIZE:-80}
      - WS_PRESENCE_INTERVAL_MS=${WS_PRESENCE_INTERVAL_MS:-1000}
      # HTTP server tuning
      - HTTP_READ_TIMEOUT_SEC=${HTTP_READ_TIMEOUT_SEC:-15}
      - HTTP_WRITE_TIMEOUT_SEC=${HTTP_WRITE_TIMEOUT_SEC:-15}
      - HTTP_IDLE_TIMEOUT_SEC=${HTTP_IDLE_TIMEOUT_SEC:-60}
      - HTTP_SHUTDOWN_TIMEOUT_SEC=${HTTP_SHUTDOWN_TIMEOUT_SEC:-30}
      # TEST_DATABASE_URL is intentionally absent — this is production.
    volumes:
      - ./backend/uploads:/root/uploads
    networks:
      - skaia-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    build:
      context: ./skaia
      dockerfile: nginx/Dockerfile
    container_name: skaia-frontend
    ports:
      - "80:80"
      - "443:443"
    networks:
      - skaia-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer — lightweight web DB manager ─────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: skaia-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - skaia-network
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  skaia-network:
    driver: bridge
